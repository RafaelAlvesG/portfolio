<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rafael Alves | Portfólio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Barra de Navegação -->
    <nav class="barra-navegacao">
        <div class="logotipo">&lt;Rafael /&gt;</div>
        <ul class="links-navegacao">
            <li><a href="#sobre">Sobre</a></li>
            <li><a href="#habilidades">Habilidades</a></li>
            <li><a href="#projetos">Projetos</a></li>
            <li><a href="#contato">Contato</a></li>
        </ul>
    </nav>

    <!-- Cabeçalho / Seção Inicial -->
    <header id="inicio">
        <div class="conteudo-inicio">
            <h1 class="container-digitando">Olá, eu sou <span class="destaque">Rafael Alves</span></h1>
            <h2 id="subtitulo">&gt; <span class="texto-digitando"></span><span class="cursor-piscar">_</span></h2>
            <p id="citacao-motivacional" class="citacao">Abrindo as cortinas...</p>
            <a href="#projetos" class="botao">Ver Projetos</a>
        </div>
    </header>

    <!-- Sobre Mim -->
    <section id="sobre" class="secao">
        <h2 class="titulo-secao">Sobre Mim</h2>
        <div class="conteudo-sobre">
            <div id="texto-sobre" class="texto-sobre">
                <!-- Preenchido via JS -->
            </div>
            <div class="container-estatisticas">
                <div class="caixa-estatistica">
                    <h3 id="tempo-estudando">0</h3>
                    <p>Meses estudando programação</p>
                </div>
                <div class="caixa-estatistica">
                    <h3 id="tempo-restante">0</h3>
                    <p>Meses para formação</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Habilidades -->
    <section id="habilidades" class="secao">
        <h2 class="titulo-secao">Habilidades</h2>
        <div id="container-habilidades" class="grade-habilidades">
            <!-- Preenchido via JS -->
        </div>
    </section>

    <!-- Projetos -->
    <section id="projetos" class="secao">
        <h2 class="titulo-secao">Projetos Recentes</h2>
        <div id="container-projetos" class="grade-projetos">
            <!-- Preenchido via JS -->
        </div>
    </section>

    <!-- Contato -->
    <section id="contato" class="secao">
        <h2 class="titulo-secao">Contato</h2>
        <form id="formulario-contato" class="formulario-contato">
            <div class="grupo-formulario">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Seu nome">
            </div>
            <div class="grupo-formulario">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com">
            </div>
            <div class="grupo-formulario">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" rows="5" placeholder="Sua mensagem"></textarea>
            </div>
            <button type="submit" class="botao botao-enviar">Enviar Mensagem</button>
            <p id="feedback-formulario" class="msg-feedback"></p>
        </form>
    </section>

    <footer>
        <div class="links-sociais">
            <a href="https://github.com/RafaelAlvesG" target="_blank" rel="noopener noreferrer"><i class="fab fa-github"></i></a>
            <a href="https://www.linkedin.com/in/rafael-alves-72b20429b/" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin"></i></a>
        </div>
        <p>&copy; 2026 Rafael Alves. Desenvolvido com HTML, CSS e JS puro.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
